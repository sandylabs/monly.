<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>54NFISCAL - Fully Filtered</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background: #0b1120; color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .excel-table { width: 100%; border-collapse: collapse; font-size: 11px; }
        .excel-table th { background: rgba(59, 130, 246, 0.05); color: #64748b; text-transform: uppercase; padding: 12px; border: 1px solid rgba(255,255,255,0.05); text-align: left; }
        .excel-table td { padding: 12px; border: 1px solid rgba(255,255,255,0.05); color: #cbd5e1; }
        .excel-table tr:nth-child(even) { background: rgba(255,255,255,0.01); }
        .excel-table tr:hover { background: rgba(59, 130, 246, 0.05); }

        .radio-container, .filter-container {
            display: flex;
            background: #0f172a;
            padding: 4px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .radio-container input, .filter-container input { display: none; }
        .radio-label, .filter-label {
            flex: 1;
            padding: 8px;
            text-align: center;
            font-size: 10px;
            font-weight: 800;
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.2s ease;
            color: #475569;
            white-space: nowrap;
        }
        #type-in:checked + label { background: #10b981; color: white; }
        #type-out:checked + label { background: #f43f5e; color: white; }
        .filter-container input:checked + label { background: #3b82f6; color: white; }
    </style>
</head>
<body class="p-4 md:p-10 max-w-5xl mx-auto space-y-6">

    <header class="px-2">
        <h1 class="text-3xl font-extrabold italic tracking-tighter text-white">54N<span class="text-blue-500">FISCAL</span></h1>
        <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mt-1">Unified Filter Analytics</p>
    </header>

    <div class="filter-container max-w-md mx-auto">
        <input type="radio" name="filter" id="filter-all" value="all" checked onchange="update()">
        <label for="filter-all" class="filter-label">SEMUA</label>
        <input type="radio" name="filter" id="filter-day" value="day" onchange="update()">
        <label for="filter-day" class="filter-label">HARI INI</label>
        <input type="radio" name="filter" id="filter-week" value="week" onchange="update()">
        <label for="filter-week" class="filter-label">MINGGU INI</label>
        <input type="radio" name="filter" id="filter-month" value="month" onchange="update()">
        <label for="filter-month" class="filter-label">BULAN INI</label>
        <input type="radio" name="filter" id="filter-year" value="year" onchange="update()">
        <label for="filter-year" class="filter-label">TAHUN INI</label>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="glass p-6 rounded-[2rem] border-l-4 border-blue-500 shadow-xl">
            <p id="stat-label-bal" class="text-[9px] font-bold text-slate-500 uppercase tracking-widest">Saldo Filter</p>
            <h2 id="bal-txt" class="text-2xl font-extrabold text-white">Rp 0</h2>
        </div>
        <div class="glass p-6 rounded-[2rem] border-l-4 border-emerald-500">
            <p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest">Pemasukan</p>
            <h2 id="inc-txt" class="text-xl font-extrabold text-emerald-400">Rp 0</h2>
        </div>
        <div class="glass p-6 rounded-[2rem] border-l-4 border-rose-500">
            <p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest">Pengeluaran</p>
            <h2 id="exp-txt" class="text-xl font-extrabold text-rose-400">Rp 0</h2>
        </div>
    </div>

    <div class="glass p-6 rounded-[2rem]">
        <div class="flex justify-between items-center mb-6 px-2">
            <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest">Filtered Equity Curve</h3>
            <span id="chart-tag" class="text-[9px] text-blue-400 font-bold bg-blue-500/10 px-3 py-1 rounded-full uppercase italic">All Time</span>
        </div>
        <div class="h-44"><canvas id="myChart"></canvas></div>
    </div>

    <div class="glass p-6 rounded-[2rem] border border-white/5 shadow-2xl">
        <form id="tx-form" class="grid grid-cols-1 md:grid-cols-4 gap-6">
            <div class="md:col-span-2">
                <label class="text-[9px] font-bold text-slate-500 uppercase ml-2">Detail</label>
                <input type="text" id="input-desc" placeholder="Transaksi apa?" class="w-full bg-slate-900 border border-slate-700 p-4 mt-1 rounded-2xl text-sm outline-none focus:border-blue-500 transition" required>
            </div>
            <div>
                <label class="text-[9px] font-bold text-slate-500 uppercase ml-2">Tipe</label>
                <div class="radio-container mt-1">
                    <input type="radio" name="tx-type" id="type-in" value="INCOME" checked>
                    <label for="type-in" class="radio-label">MASUK</label>
                    <input type="radio" name="tx-type" id="type-out" value="EXPENSE">
                    <label for="type-out" class="radio-label">KELUAR</label>
                </div>
            </div>
            <div>
                <label class="text-[9px] font-bold text-slate-500 uppercase ml-2">Nominal</label>
                <input type="number" id="input-amt" placeholder="0" class="w-full bg-slate-900 border border-slate-700 p-4 mt-1 rounded-2xl text-sm outline-none" required>
            </div>
            <div class="md:col-span-4">
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-2xl transition shadow-lg shadow-blue-500/20 active:scale-95 text-xs uppercase tracking-widest">
                    Simpan Transaksi
                </button>
            </div>
        </form>
    </div>

    <div class="glass rounded-[2rem] overflow-hidden shadow-2xl border border-white/5">
        <div class="p-5 bg-white/5 flex flex-wrap justify-between items-center gap-4">
            <h3 class="text-sm font-bold text-white uppercase tracking-wider italic">History Database</h3>
            <div class="flex gap-2">
                <button onclick="exportExcel()" class="bg-white/5 hover:bg-emerald-600 text-slate-300 hover:text-white border border-white/10 text-[9px] font-bold px-4 py-2 rounded-xl transition flex items-center gap-2">
                    <i class="fas fa-file-csv"></i> EXPORT
                </button>
                <button onclick="resetData()" class="bg-white/5 hover:bg-rose-600 text-slate-300 hover:text-white border border-white/10 text-[9px] font-bold px-4 py-2 rounded-xl transition flex items-center gap-2">
                    <i class="fas fa-rotate"></i> RESET
                </button>
            </div>
        </div>
        <div class="overflow-x-auto">
            <table class="excel-table">
                <thead>
                    <tr>
                        <th>Waktu</th>
                        <th>Keterangan</th>
                        <th>Tipe</th>
                        <th style="text-align: right;">Nominal</th>
                        <th style="text-align: center;">Aksi</th>
                    </tr>
                </thead>
                <tbody id="log-container"></tbody>
            </table>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('54n_fiscal_v9')) || [];
        let chart;

        function update() {
            const container = document.getElementById('log-container');
            const filterValue = document.querySelector('input[name="filter"]:checked').value;
            container.innerHTML = '';
            
            document.getElementById('chart-tag').innerText = filterValue.toUpperCase();

            // Logic Filter
            const now = new Date();
            const filteredDb = db.filter(t => {
                const tDate = new Date(t.date);
                if (filterValue === 'day') return tDate.toDateString() === now.toDateString();
                if (filterValue === 'week') {
                    const diff = now.getTime() - tDate.getTime();
                    return diff <= 7 * 24 * 60 * 60 * 1000;
                }
                if (filterValue === 'month') return tDate.getMonth() === now.getMonth() && tDate.getFullYear() === now.getFullYear();
                if (filterValue === 'year') return tDate.getFullYear() === now.getFullYear();
                return true;
            });

            // Urutkan dari yang terlama untuk kalkulasi chart
            const chartData = [...filteredDb].sort((a, b) => new Date(a.date) - new Date(b.date));
            
            let balLine = [0];
            let currentBal = 0;
            let fInc = 0, fExp = 0;

            chartData.forEach(t => {
                const amt = parseInt(t.amt);
                if(t.type === 'INCOME') { currentBal += amt; fInc += amt; }
                else { currentBal -= amt; fExp += amt; }
                balLine.push(currentBal);
            });

            // Tampilkan History (Urutan terbaru di atas)
            filteredDb.reverse().forEach(t => {
                const d = new Date(t.date);
                const days = ["Min", "Sen", "Sel", "Rab", "Kam", "Jum", "Sab"];
                const months = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Agu", "Sep", "Okt", "Nov", "Des"];
                const timeStr = `${days[d.getDay()]}, ${d.getDate()} ${months[d.getMonth()]} | ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;

                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="text-slate-500 whitespace-nowrap italic text-[10px]">${timeStr}</td>
                    <td class="font-bold text-slate-200 uppercase">${t.desc}</td>
                    <td><span class="px-2 py-0.5 rounded text-[8px] font-extrabold ${t.type === 'INCOME' ? 'bg-emerald-500/10 text-emerald-400' : 'bg-rose-500/10 text-rose-400'}">${t.type}</span></td>
                    <td class="text-right font-black ${t.type === 'INCOME' ? 'text-emerald-400' : 'text-rose-400'}">${parseInt(t.amt).toLocaleString()}</td>
                    <td class="text-center"><button onclick="delById('${t.id}')" class="text-slate-700 hover:text-rose-500 transition px-2"><i class="fas fa-trash"></i></button></td>
                `;
                container.appendChild(row);
            });

            document.getElementById('bal-txt').innerText = 'Rp ' + (fInc - fExp).toLocaleString();
            document.getElementById('inc-txt').innerText = 'Rp ' + fInc.toLocaleString();
            document.getElementById('exp-txt').innerText = 'Rp ' + fExp.toLocaleString();

            localStorage.setItem('54n_fiscal_v9', JSON.stringify(db));
            renderChart(balLine);
        }

        function renderChart(bLine) {
            const ctx = document.getElementById('myChart').getContext('2d');
            if(chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: bLine.map((_, i) => i),
                    datasets: [{
                        data: bLine, borderColor: '#3b82f6', borderWidth: 3, tension: 0.4, pointRadius: 0, fill: true,
                        backgroundColor: (c) => {
                            const g = c.chart.ctx.createLinearGradient(0, 0, 0, 150);
                            g.addColorStop(0, 'rgba(59, 130, 246, 0.2)'); g.addColorStop(1, 'transparent'); return g;
                        }
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { y: { display: false }, x: { display: false } }
                }
            });
        }

        document.getElementById('tx-form').addEventListener('submit', (e) => {
            e.preventDefault();
            db.push({
                id: Date.now().toString(),
                desc: document.getElementById('input-desc').value,
                type: document.querySelector('input[name="tx-type"]:checked').value,
                amt: parseInt(document.getElementById('input-amt').value),
                date: new Date().toISOString()
            });
            e.target.reset(); 
            document.getElementById('type-in').checked = true;
            update();
        });

        function exportExcel() {
            if(db.length === 0) return alert('Data kosong!');
            let csv = "Tanggal,Keterangan,Tipe,Nominal\n" + db.map(t => `${new Date(t.date).toLocaleString()},${t.desc},${t.type},${t.amt}`).join("\n");
            const link = document.createElement("a");
            link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
            link.download = `54NFISCAL_Report.csv`; link.click();
        }

        function delById(id) { if(confirm('Hapus?')) { db = db.filter(t => t.id !== id); update(); } }
        function resetData() { if(confirm('RESET SEMUA?')) { db = []; update(); } }
        update();
    </script>
</body>
</html>
