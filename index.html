<!DOCTYPE html>
<html lang="id" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monly. - Atur Duit Lo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#6366f1', secondary: '#06b6d4', accent: '#8b5cf6', danger: '#ef4444' }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.3s ease; }
        .glass { 
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }
        .dark .glass {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .grad-card { 
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.4);
        }
        input, select { transition: all 0.2s ease; }
        .radio-box input:checked + label {
            background: #6366f1;
            color: white;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }
        /* Typewriter Cursor */
        .typewriter::placeholder { border-right: 2px solid #6366f1; animation: blink 0.7s infinite; }
        @keyframes blink { 50% { border-color: transparent } }
    </style>
</head>
<body class="bg-[#f1f5f9] dark:bg-[#0f172a] text-slate-800 dark:text-slate-100 min-h-screen p-4 md:p-10">

    <div class="max-w-5xl mx-auto space-y-6">
        <header class="flex justify-between items-center px-2">
            <div>
                <h1 class="text-4xl font-extrabold italic tracking-tighter text-primary">Monly<span class="text-secondary">.</span></h1>
                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest text-sm">Biar duit lo nggak bocor alus</p>
            </div>
            <button onclick="toggleTheme()" class="w-12 h-12 glass rounded-2xl flex items-center justify-center hover:scale-110 transition">
                <i id="theme-icon" class="fas fa-moon text-primary text-xl"></i>
            </button>
        </header>

        <div class="glass p-4 rounded-3xl flex items-center gap-4">
            <div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center">
                <i class="fas fa-wand-magic-sparkles text-primary animate-pulse"></i>
            </div>
            <p id="ai-suggestion" class="text-xs italic font-semibold text-slate-600 dark:text-slate-300">Lagi ngintip dompet lo nih buat dianalisa...</p>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="grad-card p-6 rounded-[2.5rem] text-white">
                <p class="text-[9px] font-bold opacity-80 uppercase tracking-widest">Sisa Duit Lo</p>
                <h2 id="bal-txt" class="text-xl font-extrabold mt-1">Rp 0</h2>
            </div>
            <div class="glass p-6 rounded-[2.5rem] border-l-4 border-indigo-500">
                <p class="text-[9px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest">Total Masuk</p>
                <h2 id="inc-txt" class="text-lg font-bold text-indigo-500 mt-1">Rp 0</h2>
            </div>
            <div class="glass p-6 rounded-[2.5rem] border-l-4 border-rose-500">
                <p class="text-[9px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest">Total Keluar</p>
                <h2 id="exp-txt" class="text-lg font-bold text-rose-500 mt-1">Rp 0</h2>
            </div>
            <div class="glass p-6 rounded-[2.5rem] border-l-4 border-accent">
                <p class="text-[9px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest">Sisa Hutang</p>
                <h2 id="debt-txt" class="text-lg font-bold text-accent mt-1">Rp 0</h2>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-1 space-y-6">
                <div class="glass p-8 rounded-[2.5rem] shadow-xl">
                    <h3 class="text-xs font-bold uppercase text-primary mb-6 tracking-widest flex items-center gap-2">
                        <i class="fas fa-pen-nib"></i> Catat Baru Yuk!
                    </h3>
                    <form id="tx-form" class="space-y-4">
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-slate-400 ml-2 uppercase">Mau nyatat apa?</label>
                            <input type="text" id="desc" placeholder="" class="typewriter w-full bg-slate-100/50 dark:bg-slate-900/50 p-4 rounded-2xl outline-none text-sm focus:ring-2 ring-primary/20" required>
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-slate-400 ml-2 uppercase">Jenis transaksinya?</label>
                            <div class="flex gap-2 radio-box">
                                <input type="radio" name="tx-type" id="type-in" value="INCOME" checked onchange="toggleForm()" class="hidden">
                                <label for="type-in" class="flex-1 py-3 bg-slate-100 dark:bg-slate-900 text-[10px] font-bold text-center rounded-xl cursor-pointer">MASUK</label>
                                <input type="radio" name="tx-type" id="type-out" value="EXPENSE" onchange="toggleForm()" class="hidden">
                                <label for="type-out" class="flex-1 py-3 bg-slate-100 dark:bg-slate-900 text-[10px] font-bold text-center rounded-xl cursor-pointer">KELUAR</label>
                                <input type="radio" name="tx-type" id="type-debt" value="DEBT" onchange="toggleForm()" class="hidden">
                                <label for="type-debt" class="flex-1 py-3 bg-slate-100 dark:bg-slate-900 text-[10px] font-bold text-center rounded-xl cursor-pointer">HUTANG</label>
                            </div>
                        </div>
                        <div id="deadline-box" class="hidden space-y-1">
                            <label class="text-[10px] font-bold text-accent ml-2 uppercase">Kapan kudu lunas?</label>
                            <input type="date" id="deadline" class="w-full bg-slate-100/50 dark:bg-slate-900/50 p-4 rounded-2xl outline-none text-sm">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-slate-400 ml-2 uppercase">Nominalnya berapa?</label>
                            <input type="text" id="amt-display" placeholder="Rp 0" class="w-full bg-slate-100/50 dark:bg-slate-900/50 p-4 rounded-2xl outline-none text-sm font-bold">
                            <input type="hidden" id="amt-raw">
                        </div>
                        <button type="submit" class="w-full bg-primary hover:bg-indigo-600 text-white font-bold py-4 rounded-2xl transition-all shadow-lg shadow-primary/30 active:scale-95 text-xs uppercase tracking-[0.2em] mt-2">Beres, Simpan!</button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-6">
                <div class="glass p-6 rounded-[2.5rem]">
                    <div class="h-60"><canvas id="myChart"></canvas></div>
                </div>

                <div class="glass rounded-[2.5rem] overflow-hidden">
                    <div class="p-6 bg-white/10 flex justify-between items-center border-b border-white/20">
                        <h3 class="text-xs font-bold uppercase tracking-widest italic text-indigo-500">History Log</h3>
                        <div class="flex gap-3">
                            <button onclick="exportCSV()" class="text-emerald-500 hover:scale-110 transition"><i class="fas fa-file-csv"></i></button>
                            <button onclick="resetData()" class="text-rose-500 hover:scale-110 transition"><i class="fas fa-trash-can"></i></button>
                        </div>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-[11px]">
                            <tbody id="log-container" class="divide-y divide-slate-200 dark:divide-slate-700"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-cicil" class="fixed inset-0 bg-black/60 backdrop-blur-md z-50 flex items-center justify-center hidden p-6">
        <div class="glass p-8 w-full max-w-sm space-y-6 rounded-[2.5rem]">
            <h3 class="text-lg font-extrabold text-center tracking-tight">Cicil Hutang Dulu 💸</h3>
            <p id="cicil-desc" class="text-[10px] text-center text-slate-500 uppercase font-bold italic"></p>
            <div class="space-y-2">
                <label class="text-[9px] font-bold text-slate-400 ml-2 uppercase">Mau bayar berapa?</label>
                <input type="text" id="cicil-amt-display" class="w-full bg-slate-100/50 dark:bg-slate-900/50 p-4 rounded-2xl outline-none text-sm font-bold">
                <input type="hidden" id="cicil-amt-raw">
            </div>
            <div class="flex gap-3">
                <button onclick="closeModal()" class="flex-1 py-4 font-bold text-slate-400 hover:text-slate-600 transition">BATAL</button>
                <button onclick="saveInstallment()" class="flex-1 bg-emerald-500 text-white font-bold py-4 rounded-2xl shadow-lg shadow-emerald-500/30">GAS BAYAR</button>
            </div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('monly_pro_aesthetic')) || [];
        let chart;
        let activeDebtId = null;

        // --- Typewriter Placeholder Logic ---
        const placeholders = [
            "Beli kopi susu senja...",
            "Gaji bulan ini cair nih!",
            "Bayar hutang ke temen...",
            "Top up saldo e-wallet...",
            "Duit parkir motor...",
            "Jajan seblak level pedas..."
        ];
        let pIdx = 0, charIdx = 0, isDeleting = false;
        function typeEffect() {
            const input = document.getElementById('desc');
            const currentText = placeholders[pIdx];
            if (!isDeleting) {
                input.placeholder = currentText.substring(0, charIdx++);
                if (charIdx > currentText.length) { isDeleting = true; setTimeout(typeEffect, 2000); return; }
            } else {
                input.placeholder = currentText.substring(0, charIdx--);
                if (charIdx === 0) { isDeleting = false; pIdx = (pIdx + 1) % placeholders.length; }
            }
            setTimeout(typeEffect, isDeleting ? 40 : 80);
        }
        typeEffect();

        // --- Theme Toggle ---
        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('theme-icon');
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                icon.className = 'fas fa-moon text-primary';
                localStorage.setItem('monly_theme', 'light');
            } else {
                html.classList.add('dark');
                icon.className = 'fas fa-sun text-secondary';
                localStorage.setItem('monly_theme', 'dark');
            }
        }
        if (localStorage.getItem('monly_theme') === 'dark') {
            document.documentElement.classList.add('dark');
            document.getElementById('theme-icon').className = 'fas fa-sun text-secondary';
        }

        // --- Currency Formatter ---
        const formatInput = (displayId, rawId) => {
            const display = document.getElementById(displayId);
            const raw = document.getElementById(rawId);
            display.addEventListener('input', (e) => {
                let val = e.target.value.replace(/\D/g, "");
                raw.value = val;
                display.value = val ? "Rp " + parseInt(val).toLocaleString('id-ID') : "";
            });
        };
        formatInput('amt-display', 'amt-raw');
        formatInput('cicil-amt-display', 'cicil-amt-raw');

        function toggleForm() {
            document.getElementById('deadline-box').classList.toggle('hidden', !document.getElementById('type-debt').checked);
        }

        function update() {
            const container = document.getElementById('log-container');
            container.innerHTML = '';
            let bal = 0, inc = 0, exp = 0, debtTotal = 0;
            let balLine = [0], debtLine = [0];

            db.sort((a,b) => new Date(a.date) - new Date(b.date));
            db.forEach(t => {
                const a = parseInt(t.amt);
                if(t.type === 'INCOME') { bal += a; inc += a; }
                else if(t.type === 'EXPENSE') { bal -= a; exp += a; }
                else if(t.type === 'DEBT') { debtTotal += (a - (t.paid || 0)); }
                balLine.push(bal); debtLine.push(debtTotal);
            });

            db.slice().reverse().forEach(t => {
                const d = new Date(t.date);
                const sisa = t.type === 'DEBT' ? parseInt(t.amt) - (t.paid || 0) : 0;
                const row = document.createElement('tr');
                row.className = sisa === 0 && t.type === 'DEBT' ? "opacity-30" : "";
                row.innerHTML = `
                    <td class="p-5">
                        <div class="text-[8px] text-slate-400 font-bold uppercase tracking-tighter">${d.toLocaleDateString('id-ID')} | ${d.getHours()}:${d.getMinutes()}</div>
                        <div class="font-bold text-slate-700 dark:text-slate-200 uppercase text-xs">${t.desc}</div>
                        ${t.deadline ? `<div class="text-[8px] text-primary font-black italic">Batas: ${t.deadline}</div>` : ''}
                    </td>
                    <td class="p-5 text-center">
                        <span class="px-2 py-0.5 rounded-md text-[7px] font-black ${t.type === 'INCOME' ? 'bg-indigo-500/10 text-indigo-500' : t.type === 'DEBT' ? 'bg-primary/10 text-primary' : 'bg-rose-500/10 text-rose-500'}">${t.type}</span>
                    </td>
                    <td class="p-5 text-right font-bold">
                        <div class="${t.type === 'INCOME' ? 'text-indigo-600' : 'text-rose-500'}">Rp ${parseInt(t.amt).toLocaleString()}</div>
                        ${t.type === 'DEBT' ? `<div class="text-[8px] text-slate-400 font-bold">Sisa: Rp ${sisa.toLocaleString()}</div>` : ''}
                    </td>
                    <td class="p-5 text-right">
                        <div class="flex items-center justify-end gap-3">
                            ${t.type === 'DEBT' && sisa > 0 ? `<button onclick="openModal('${t.id}', '${t.desc}', ${sisa})" class="text-primary hover:scale-110 transition"><i class="fas fa-hand-holding-dollar"></i></button>` : ''}
                            <button onclick="del('${t.id}')" class="text-slate-300 hover:text-rose-500 transition"><i class="fas fa-trash"></i></button>
                        </div>
                    </td>
                `;
                container.appendChild(row);
            });

            document.getElementById('bal-txt').innerText = 'Rp ' + bal.toLocaleString('id-ID');
            document.getElementById('inc-txt').innerText = 'Rp ' + inc.toLocaleString('id-ID');
            document.getElementById('exp-txt').innerText = 'Rp ' + exp.toLocaleString('id-ID');
            document.getElementById('debt-txt').innerText = 'Rp ' + debtTotal.toLocaleString('id-ID');

            renderChart(balLine, debtLine);
            localStorage.setItem('monly_pro_aesthetic', JSON.stringify(db));
            
            const ai = document.getElementById('ai-suggestion');
            if(debtTotal > bal) ai.innerText = "🚨 Bos, saldo lo kesalip hutang. Rem jajan dulu, fokus lunasin tagihan!";
            else if (debtTotal > 0) ai.innerText = "✅ Saldo aman. Fokus cicil sisa hutang Rp " + debtTotal.toLocaleString() + " mumpung ada dana!";
            else ai.innerText = "🔥 Mantap! Lo bebas hutang, dompet lagi sehat-sehatnya nih.";
        }

        function openModal(id, desc, sisa) {
            activeDebtId = id;
            document.getElementById('cicil-desc').innerText = `${desc} (Sisa: Rp ${sisa.toLocaleString()})`;
            document.getElementById('modal-cicil').classList.remove('hidden');
        }
        function closeModal() { document.getElementById('modal-cicil').classList.add('hidden'); }

        function saveInstallment() {
            const amt = parseInt(document.getElementById('cicil-amt-raw').value);
            if(!amt) return alert("Nominalnya isi dulu, Bos!");
            const target = db.find(t => t.id === activeDebtId);
            const sisa = target.amt - (target.paid || 0);
            if(amt > sisa) return alert("Nominal cicilan kegedean!");
            target.paid = (target.paid || 0) + amt;
            db.push({ id: Date.now().toString(), desc: "Cicil: " + target.desc, type: 'EXPENSE', amt: amt, date: new Date().toISOString() });
            closeModal(); update();
        }

        function renderChart(bl, dl) {
            const ctx = document.getElementById('myChart').getContext('2d');
            if(chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: bl.map((_,i)=>i),
                    datasets: [
                        { label: 'Saldo', data: bl, borderColor: '#6366f1', borderWidth: 3, tension: 0.4, pointRadius: 0, fill: true, backgroundColor: 'rgba(99, 102, 241, 0.1)' },
                        { label: 'Hutang', data: dl, borderColor: '#a855f7', borderWidth: 2, borderDash: [5,5], tension: 0.4, pointRadius: 0 }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { display: false } } }
            });
        }

        document.getElementById('tx-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const type = document.querySelector('input[name="tx-type"]:checked').value;
            db.push({
                id: Date.now().toString(),
                desc: document.getElementById('desc').value,
                type: type,
                amt: parseInt(document.getElementById('amt-raw').value),
                deadline: type === 'DEBT' ? document.getElementById('deadline').value : null,
                paid: 0, date: new Date().toISOString()
            });
            e.target.reset(); document.getElementById('amt-raw').value = ""; document.getElementById('amt-display').value = ""; update();
        });

        function del(id) { if(confirm('Yakin hapus ini, Bos?')) { db = db.filter(t => t.id !== id); update(); } }
        function resetData() { if(confirm('HAPUS SEMUA DATA?')) { db = []; update(); } }
        function exportCSV() {
            let c = "Tanggal,Keterangan,Tipe,Nominal\n" + db.map(t => `${t.date},${t.desc},${t.type},${t.amt}`).join("\n");
            let link = document.createElement('a'); link.href = URL.createObjectURL(new Blob([c], {type:'text/csv'}));
            link.download = "Monly_Financial_Report.csv"; link.click();
        }
        update();
    </script>
</body>
</html>
